# Скопируй это и замени содержимое своего файла полностью!

name: Update Subscription
on:
  schedule:
    - cron: '0 */3 * * *' # Раз в 6 часов
  workflow_dispatch: # Чтобы можно было запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scraper
        run: python scraper.py
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Мы добавляем только sub.txt, так как list.txt больше не нужен
          git add sub.txt 
          git commit -m "Update nodes: $(date)" || exit 0
          git push
